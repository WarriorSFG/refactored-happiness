<!DOCTYPE html>
<html>
<head>
    <title>Hex Board Game</title>
    <style>
        body { font-family: monospace; font-size: 20px; background-color: #f4f4f9; padding: 20px;}
        .row { display: flex; margin-bottom: 5px; }
        .cell { 
            width: 30px; height: 30px; 
            border: 1px solid #ccc; 
            text-align: center; line-height: 30px; 
            cursor: pointer; background: white;
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <h2>Board UI (JS) powered by Core Engine (C++)</h2>
    <div id="status">Player X's Turn</div>
    <div id="board" style="margin-top: 20px;"></div>

    <script src="engine.js"></script>
    <script>
        let gameBoard;
        let currentPlayer = 'X';
        const width = 5;
        const height = 5;

        // Emscripten module initialization
        Module.onRuntimeInitialized = () => {
            // Instantiate the C++ Graph class directly in JavaScript!
            gameBoard = new Module.Graph(width, height);
            renderBoard();
        };

        function handleCellClick(x, y) {
            // Call C++ Move function
            const moveSuccessful = gameBoard.Move(currentPlayer, x, y);
            
            if (moveSuccessful) {
                // Call C++ CheckForWin function
                if (gameBoard.CheckForWin(currentPlayer)) {
                    document.getElementById('status').innerText = `Player ${currentPlayer} Wins!`;
                    document.getElementById('board').style.pointerEvents = 'none'; // Lock board
                } else {
                    // Swap turns
                    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                    document.getElementById('status').innerText = `Player ${currentPlayer}'s Turn`;
                }
                renderBoard();
            }
        }

        function renderBoard() {
            const boardDiv = document.getElementById('board');
            boardDiv.innerHTML = ''; // Clear current board

            for (let y = 0; y < height; y++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'row';
                
                // Hexagonal offset purely handled in JS CSS styling
                rowDiv.style.marginLeft = `${y * 17}px`; 

                for (let x = 0; x < width; x++) {
                    const cellDiv = document.createElement('div');
                    cellDiv.className = 'cell';
                    
                    // Call C++ getter to see what is at this coordinate
                    const state = gameBoard.GetCellState(x, y);
                    cellDiv.innerText = state !== '.' ? state : '';
                    
                    if (state === '.') {
                        cellDiv.onclick = () => handleCellClick(x, y);
                    } else {
                        // Change color based on player
                        cellDiv.style.color = state === 'X' ? '#d9534f' : '#5bc0de';
                        cellDiv.style.fontWeight = 'bold';
                    }

                    rowDiv.appendChild(cellDiv);
                }
                boardDiv.appendChild(rowDiv);
            }
        }
    </script>
</body>
</html>
